<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SPA - CRUD Usuarios</title>

  <!-- Tailwind CSS via CDN para los estilos -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

  <!--
    =====================================================
    SPA (Single Page Application) - Estructura General
    =====================================================
    En lugar de múltiples archivos HTML + JS separados,
    todo vive en un solo archivo. La "navegación" se
    simula mostrando/ocultando secciones con JS.

    Páginas que tenemos:
      #page-login    → main.js     (formulario de login)
      #page-registro → registro.js (formulario de registro)
      #page-dashboard→ Dashfrots.js (CRUD de usuarios)
  -->

  <!-- ==================== LOGIN ==================== -->
  <div id="page-login">

    <!-- Fondo degradado igual al original de main.js -->
    <div class="min-h-screen flex items-center justify-center bg-gradient-to-r from-blue-300 to-red-300">

      <!-- Tarjeta del formulario -->
      <form id="loginForm" class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">

        <h1 class="font-bold text-center text-2xl mt-1 mb-6">Login</h1>

        <!-- Campo username -->
        <label class="block text-gray-700 mb-2" for="loginUsername">Username</label>
        <input
          id="loginUsername"
          type="text"
          placeholder="example@gmail.com"
          class="w-full px-4 py-2 border border-gray-300 bg-gray-50 rounded-lg
                 focus:outline-none focus:ring-2 focus:ring-blue-400"/>

        <!-- Campo password -->
        <label class="block text-gray-700 mb-2 mt-4" for="loginPassword">Password</label>
        <input
          id="loginPassword"
          type="password"
          placeholder="*********"
          class="w-full px-4 py-2 border border-gray-300 bg-gray-50 rounded-lg
                 focus:outline-none focus:ring-2 focus:ring-blue-400"/>

        <!-- Botón de login -->
        <button
          type="submit"
          class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition mt-8">
          Login
        </button>

        <!-- Link para ir al registro -->
        <p class="text-center mt-3">
          Don't have an account?
          <!-- navigateTo() es la función SPA que cambia de "página" -->
          <button type="button" onclick="navigateTo('registro')"
            class="text-blue-500 font-bold hover:underline">
            Register
          </button>
        </p>

      </form>
    </div>
  </div>


  <!-- ==================== REGISTRO ==================== -->
  <!--
    hidden = oculto por defecto.
    Solo se muestra cuando navigateTo('registro') es llamado.
  -->
  <div id="page-registro" class="hidden">

    <div class="min-h-screen flex items-center justify-center bg-gradient-to-r from-blue-300 to-purple-400">

      <form id="registerForm" class="bg-white w-full max-w-md p-8 rounded-2xl shadow-2xl">

        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">Register</h1>

        <!-- Campo username -->
        <div class="mb-4">
          <label class="block text-gray-700 mb-2">Username</label>
          <input
            type="text"
            id="regUsername"
            placeholder="Enter your username"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-50
                   focus:outline-none focus:ring-2 focus:ring-purple-400"/>
        </div>

        <!-- Campo email -->
        <div class="mb-4">
          <label class="block text-gray-700 mb-2">Email</label>
          <input
            type="email"
            id="regEmail"
            placeholder="example@gmail.com"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-50
                   focus:outline-none focus:ring-2 focus:ring-purple-400"/>
        </div>

        <!-- Campo password -->
        <div class="mb-4">
          <label class="block text-gray-700 mb-2">Password</label>
          <input
            type="password"
            id="regPassword"
            placeholder="********"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-50
                   focus:outline-none focus:ring-2 focus:ring-purple-400"/>
        </div>

        <!-- Campo confirmar password -->
        <div class="mb-6">
          <label class="block text-gray-700 mb-2">Confirm Password</label>
          <input
            type="password"
            id="regConfirmPassword"
            placeholder="********"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-50
                   focus:outline-none focus:ring-2 focus:ring-purple-400"/>
        </div>

        <!-- Botón crear cuenta -->
        <button
          type="submit"
          class="w-full bg-purple-500 hover:bg-purple-600 transition duration-300
                 text-white py-3 rounded-lg font-semibold shadow-lg">
          Create Account
        </button>

        <!-- Link para volver al login -->
        <p class="text-center text-gray-600 mt-5">
          Already have an account?
          <button type="button" onclick="navigateTo('login')"
            class="text-purple-500 font-bold cursor-pointer hover:underline">
            Login
          </button>
        </p>

      </form>
    </div>
  </div>


  <!-- ==================== DASHBOARD ==================== -->
  <!--
    También oculto por defecto.
    Solo aparece después de un login exitoso.
  -->
  <div id="page-dashboard" class="hidden">

    <div class="min-h-screen bg-gradient-to-r from-blue-200 to-purple-300 p-5">

      <!-- HEADER -->
      <header class="bg-white shadow-lg rounded-xl p-6">

        <!-- Título + botón de cerrar sesión -->
        <div class="flex justify-between items-center mb-8">
          <h1 class="text-3xl font-bold text-gray-800">CRUD Usuarios</h1>

          <!-- Cerrar sesión: limpia sessionStorage y vuelve al login -->
          <button
            onclick="logout()"
            class="bg-red-100 hover:bg-red-200 text-red-700 px-4 py-2 rounded-lg text-sm">
            Cerrar sesión
          </button>
        </div>

        <!-- Barra de búsqueda y botón New -->
        <div class="flex justify-between items-center">

          <!-- Buscador: filtra las cards en tiempo real -->
          <div class="flex gap-3">
            <input
              id="searchInput"
              type="text"
              placeholder="Ingrese el dato a buscar"
              class="border-2 border-gray-400 rounded-lg px-4 py-2 w-96 outline-none"/>

            <button class="bg-indigo-100 hover:bg-indigo-200 px-5 py-2 rounded-lg">
              Buscar
            </button>
          </div>

          <!-- Botón para mostrar el formulario de creación -->
          <button
            id="newBtn"
            class="bg-gradient-to-r from-purple-400 to-purple-500 hover:from-purple-500
                   hover:to-purple-600 text-white px-16 py-2 rounded-lg">
            New
          </button>

        </div>
      </header>


      <!-- FORMULARIO DE CREACIÓN (oculto por defecto) -->
      <section id="formulario" class="hidden bg-white mt-5 p-5 rounded-xl shadow-xl">

        <form id="formData" class="space-y-4">

          <input
            type="text"
            id="cardName"
            placeholder="Name"
            class="w-full border p-2 rounded"
            required/>

          <input
            type="text"
            id="cardPhoto"
            placeholder="Photo URL"
            class="w-full border p-2 rounded"
            required/>

          <textarea
            id="cardDescription"
            placeholder="Description"
            class="w-full border p-2 rounded"
            required></textarea>

          <div class="flex justify-between">

            <!-- Cancel: oculta el formulario sin crear nada -->
            <button type="button" id="cancelBtn"
              class="bg-gray-400 text-white px-4 py-2 rounded">
              Cancel
            </button>

            <!-- Submit: crea la card -->
            <button type="submit"
              class="bg-green-500 text-white px-4 py-2 rounded">
              Create
            </button>

          </div>
        </form>
      </section>


      <!-- GRID DE CARDS -->
      <!--
        Las cards se generan dinámicamente con JS.
        Cada card tiene botón Delete que elimina el elemento del DOM.
      -->
      <section
        id="cardsContainer"
        class="grid grid-cols-1 md:grid-cols-3 gap-5 mt-5">
      </section>

    </div>
  </div>


  <script>
    // ============================================================
    // SISTEMA DE NAVEGACIÓN SPA
    // ============================================================
    // En una SPA real no hay window.location.href entre páginas.
    // En cambio, mostramos/ocultamos secciones del DOM.

    // Lista de todas las "páginas" disponibles
    const PAGES = ['login', 'registro', 'dashboard'];

    function navigateTo(page) {
      // Ocultar todas las páginas
      PAGES.forEach(p => {
        document.getElementById('page-' + p).classList.add('hidden');
      });

      // Mostrar solo la página destino
      document.getElementById('page-' + page).classList.remove('hidden');
    }


    // ============================================================
    // USUARIOS VÁLIDOS (mismo array del main.js original)
    // ============================================================
    const users = [
      { username: "neyder.ramirez",   password: "123Admin.**" },
      { username: "juan.bustamante",  password: "123Admin.**" },
      { username: "kevin.mendoza",    password: "123Admin.**" },
      // Credencial de prueba del original:
      { username: "kevinsenta",       password: "Admin123"    }
    ];


    // ============================================================
    // LOGIN
    // ============================================================
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();

      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value.trim();

      // Validar que no estén vacíos
      if (!username || !password) {
        alert('Ingresa usuario y contraseña');
        return;
      }

      // Buscar si el usuario existe en el array
      const match = users.find(u => u.username === username && u.password === password);

      if (match) {
        // Guardar sesión (mismo comportamiento del main.js original)
        sessionStorage.setItem('user', username);
        localStorage.setItem('user', username);

        // Navegar al dashboard
        navigateTo('dashboard');
      } else {
        alert('Usuario o contraseña incorrectos');
      }
    });


    // ============================================================
    // REGISTRO
    // ============================================================
    document.getElementById('registerForm').addEventListener('submit', (e) => {
      e.preventDefault();

      const username = document.getElementById('regUsername').value.trim();
      const email    = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm  = document.getElementById('regConfirmPassword').value;

      // Validar que las contraseñas coincidan
      if (password !== confirm) {
        alert('Las contraseñas no coinciden');
        return;
      }

      if (!username || !email || !password) {
        alert('Completa todos los campos');
        return;
      }

      // Agregar el nuevo usuario al array en memoria
      // (en un proyecto real esto iría a una API o localStorage)
      users.push({ username, password });

      alert(`¡Cuenta creada para ${username}! Ya puedes iniciar sesión.`);

      // Redirigir al login tras registrarse
      navigateTo('login');
    });


    // ============================================================
    // LOGOUT
    // ============================================================
    function logout() {
      // Limpiar sesión guardada
      sessionStorage.removeItem('user');
      localStorage.removeItem('user');

      // Volver al login
      navigateTo('login');
    }


    // ============================================================
    // DASHBOARD - mostrar/ocultar formulario
    // ============================================================
    document.getElementById('newBtn').addEventListener('click', () => {
      document.getElementById('formulario').classList.remove('hidden');
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      document.getElementById('formulario').classList.add('hidden');
    });


    // ============================================================
    // DASHBOARD - crear card
    // ============================================================
    document.getElementById('formData').addEventListener('submit', (e) => {
      e.preventDefault();

      const name        = document.getElementById('cardName').value;
      const photo       = document.getElementById('cardPhoto').value;
      const description = document.getElementById('cardDescription').value;

      const cardsContainer = document.getElementById('cardsContainer');

      // Insertar nueva card en el grid usando innerHTML +=
      cardsContainer.innerHTML += `
        <div class="card bg-white rounded-2xl overflow-hidden shadow-xl">
          <img src="${photo}" class="w-full h-56 object-cover"
               onerror="this.src='https://placehold.co/400x224?text=Sin+imagen'">
          <div class="p-5">
            <h2 class="text-2xl font-bold">${name}</h2>
            <p class="text-gray-600 mt-2">${description}</p>
            <div class="flex gap-3 mt-4">
              <button class="delete bg-red-500 text-white px-3 py-1 rounded">
                Delete
              </button>
            </div>
          </div>
        </div>
      `;

      // Limpiar formulario y ocultarlo
      e.target.reset();
      document.getElementById('formulario').classList.add('hidden');
    });


    // ============================================================
    // DASHBOARD - eliminar card (event delegation)
    // ============================================================
    // En vez de poner un listener en cada botón Delete,
    // usamos un solo listener en el contenedor padre.
    // Cuando el click llega, preguntamos si el target tiene
    // la clase "delete" y actuamos.
    document.getElementById('cardsContainer').addEventListener('click', (e) => {
      if (e.target.classList.contains('delete')) {
        // .closest('.card') sube en el DOM hasta encontrar el div con esa clase
        e.target.closest('.card').remove();
      }
    });


    // ============================================================
    // DASHBOARD - búsqueda en tiempo real
    // ============================================================
    document.getElementById('searchInput').addEventListener('input', () => {
      const value    = document.getElementById('searchInput').value.toLowerCase();
      const allCards = document.getElementById('cardsContainer').querySelectorAll('.card');

      allCards.forEach(card => {
        const cardName = card.querySelector('h2').textContent.toLowerCase();

        // Mostrar u ocultar según si el nombre incluye el texto buscado
        card.style.display = cardName.includes(value) ? 'block' : 'none';
      });
    });


    // ============================================================
    // INICIALIZACIÓN
    // ============================================================
    // Al cargar la app, verificar si ya hay una sesión activa.
    // Si hay sesión en sessionStorage → ir directo al dashboard.
    // Si no → mostrar el login (que ya es visible por defecto).
    (function init() {
      const activeUser = sessionStorage.getItem('user');
      if (activeUser) {
        navigateTo('dashboard');
      } else {
        navigateTo('login');
      }
    })();
  </script>

</body>
</html>
